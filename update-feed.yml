name: Update podcast feed

on:
  schedule:
    # Runs every Monday and Thursday at 8:00 AM Central Time (14:00 UTC)
    # Adjust the cron expression if you want a different schedule.
    # Cron syntax: minute hour day-of-month month day-of-week
    - cron: "0 14 * * 1,4"

  # Allow running manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  update-feed:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push the updated XML back to the repo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        env:
          # Replace this with your actual GitHub Pages URL after first deploy
          FEED_SELF_URL: https://yourusername.github.io/nebraska-sc-podcast/nebraska-sc-oral-arguments.xml
        run: python scrape.py

      - name: Commit and push updated feed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nebraska-sc-oral-arguments.xml
          # Only commit if the file actually changed
          git diff --cached --quiet || git commit -m "chore: update podcast feed $(date -u +'%Y-%m-%d')"
          git push
