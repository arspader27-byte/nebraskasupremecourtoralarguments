name: Update podcast feed

on:
  schedule:
    # Runs every Monday and Thursday at 8:00 AM Central Time (14:00 UTC)
    - cron: "0 14 * * 1,4"

  # Allow running manually from the GitHub Actions tab
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-feed:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        env:
          FEED_SELF_URL: https://arspader27-byte.github.io/nebraskasupremecourtoralarguments/nebraska-sc-oral-arguments.xml
        run: python scrape.py

      - name: Commit and push updated feed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/arspader27-byte/nebraskasupremecourtoralarguments.git
          git add nebraska-sc-oral-arguments.xml
          git diff --cached --quiet || git commit -m "chore: update podcast feed $(date -u +'%Y-%m-%d')"
          git push
